# .github/workflows/deploy.yml
# ══════════════════════════════════════════════════════════════
# Pipeline CI/CD — Data Lake Amaris Energía
#
# Jobs que siempre corren (sin necesidad de cuenta AWS):
#   1. Lint + Tests     → flake8 + 37 tests unitarios con moto
#   2. Terraform Validate → fmt + validate sintaxis HCL
#
# Jobs que requieren configurar Secrets en GitHub (opcionales):
#   3. Terraform Plan   → solo en Pull Requests (requiere AWS_ROLE_ARN)
#   4. Terraform Apply  → solo en merge a main  (requiere AWS_ROLE_ARN)
#
# Para habilitar el despliegue real, configurar en:
# GitHub → Settings → Secrets and variables → Actions:
#   AWS_ROLE_ARN   → ARN del rol IAM con permisos de despliegue (OIDC)
#   ALERT_EMAIL    → Email para alertas de CloudWatch
# ══════════════════════════════════════════════════════════════

name: Deploy Data Lake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:     "us-east-1"
  TF_VERSION:     "1.7.0"
  PYTHON_VERSION: "3.12"

permissions:
  id-token:      write
  contents:      read
  pull-requests: write

# ── Job 1: Lint y Tests ───────────────────────────────────────
jobs:
  test:
    name: "Lint + Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: "Lint: flake8"
        run: flake8 scripts/ glue_jobs/ lambda/ tests/

      - name: "Tests unitarios (sin AWS)"
        run: |
          pytest tests/ \
            --ignore=tests/test_deploy_data.py \
            -v \
            --cov=tests \
            --cov-report=term-missing

      - name: "Tests con moto (simulación AWS en memoria)"
        run: pytest tests/test_deploy_data.py -v

  # ── Job 2: Validar sintaxis Terraform ────────────────────────
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform fmt (verificar formato HCL)"
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: "terraform validate (verificar sintaxis)"
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform

  # ── Job 3: Plan (PRs — requiere AWS_ROLE_ARN configurado) ───
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: |
      github.event_name == 'pull_request' &&
      secrets.AWS_ROLE_ARN != ''

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticación en AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -input=false
        working-directory: terraform

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/dev/terraform.tfvars \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: terraform

      - name: Publicar plan en el PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncado)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Job 4: Apply (merge a main — requiere AWS_ROLE_ARN) ──────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.AWS_ROLE_ARN != ''
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticación en AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Empaquetar Lambda
        run: |
          cd lambda
          zip -r ../terraform/lambda_ingestion.zip ingestion_handler.py

      - name: terraform init
        run: terraform init -input=false
        working-directory: terraform

      - name: terraform apply
        run: |
          terraform apply \
            -var-file=environments/dev/terraform.tfvars \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -auto-approve
        working-directory: terraform

      - name: Subir datos de muestra a S3
        run: |
          LANDING=$(terraform -chdir=terraform output -raw landing_bucket 2>/dev/null || echo "")
          if [ -n "$LANDING" ]; then
            PARTITION="year=2024/month=01/day=15/hour=00"
            for DS in proveedores clientes transacciones; do
              aws s3 cp data/sample/$DS.csv s3://$LANDING/raw/$DS/$PARTITION/$DS.csv
              echo "  ✅ Subido: $DS.csv"
            done
          fi
