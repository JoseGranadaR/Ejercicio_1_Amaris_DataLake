# .github/workflows/deploy.yml
# ══════════════════════════════════════════════════════════════
# Pipeline CI/CD — Data Lake Amaris Energía
#
# Flujo completo:
#   1. Lint + Tests         → siempre corre
#   2. Terraform Validate   → siempre corre
#   3. Check Credentials    → detecta si AWS_ROLE_ARN está configurado
#   4. Terraform Plan       → solo en PRs con credenciales
#   5. Terraform Apply      → solo en merge a main con credenciales
#
# Para habilitar Plan y Apply, configurar en:
# GitHub → Settings → Secrets and variables → Actions:
#   AWS_ROLE_ARN   → ARN del rol IAM con permisos OIDC
#   ALERT_EMAIL    → Email para alertas de CloudWatch
# ══════════════════════════════════════════════════════════════

name: CI/CD — Data Lake Amaris

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:     "us-east-1"
  TF_VERSION:     "1.7.0"
  PYTHON_VERSION: "3.12"

permissions:
  id-token:      write
  contents:      read
  pull-requests: write

jobs:

  # ── Job 1: Calidad de código y tests ─────────────────────────
  test:
    name: "Lint + Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: "Lint: flake8"
        run: flake8 scripts/ glue_jobs/ lambda/ tests/

      - name: "Tests unitarios (sin AWS)"
        run: |
          pytest tests/ \
            --ignore=tests/test_deploy_data.py \
            -v \
            --cov=tests \
            --cov-report=term-missing

      - name: "Tests con moto (simulación AWS en memoria)"
        run: pytest tests/test_deploy_data.py -v

  # ── Job 2: Validar sintaxis de Terraform ─────────────────────
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform fmt — verificar formato HCL"
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: "terraform validate — verificar sintaxis"
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform

  # ── Job 3: Detectar si hay credenciales AWS disponibles ───────
  # secrets solo se puede leer dentro de un step (no en if: de job).
  # Este job lee el secret en un step y lo exporta como output
  # para que los jobs siguientes puedan usarlo en su condición if:.
  check-credentials:
    name: "Check AWS Credentials"
    runs-on: ubuntu-latest
    needs: terraform-validate
    outputs:
      has_aws: ${{ steps.check.outputs.has_aws }}

    steps:
      - name: Verificar si AWS_ROLE_ARN está configurado
        id: check
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "$ROLE_ARN" ]; then
            echo "has_aws=true"  >> $GITHUB_OUTPUT
            echo "✅ Credenciales AWS detectadas — Plan y Apply se ejecutarán"
          else
            echo "has_aws=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Sin credenciales AWS — Plan y Apply se omitirán"
          fi

  # ── Job 4: Plan (solo en PRs con credenciales) ───────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: [test, terraform-validate, check-credentials]
    if: |
      github.event_name == 'pull_request' &&
      needs.check-credentials.outputs.has_aws == 'true'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticación en AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -input=false
        working-directory: terraform

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/dev/terraform.tfvars \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: terraform

      - name: Publicar plan como comentario en el PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncado)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Job 5: Apply (solo en merge a main con credenciales) ─────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: [test, terraform-validate, check-credentials]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.check-credentials.outputs.has_aws == 'true'
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticación en AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Empaquetar Lambda
        run: |
          cd lambda
          zip -r ../terraform/lambda_ingestion.zip ingestion_handler.py
          echo "Lambda: $(du -sh ../terraform/lambda_ingestion.zip | cut -f1)"

      - name: terraform init
        run: terraform init -input=false
        working-directory: terraform

      - name: terraform apply
        run: |
          terraform apply \
            -var-file=environments/dev/terraform.tfvars \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -auto-approve
        working-directory: terraform

      - name: Subir datos de muestra a S3
        run: |
          LANDING=$(terraform -chdir=terraform output -raw landing_bucket 2>/dev/null || echo "")
          if [ -n "$LANDING" ]; then
            PART="year=2024/month=01/day=15/hour=00"
            for DS in proveedores clientes transacciones; do
              aws s3 cp data/sample/$DS.csv s3://$LANDING/raw/$DS/$PART/$DS.csv
              echo "  ✅ $DS.csv"
            done
          fi

      - name: Resumen del despliegue
        run: |
          echo "## ✅ Data Lake desplegado"            >> $GITHUB_STEP_SUMMARY
          echo "| Campo  | Valor |"                    >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|"                    >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Autor  | ${{ github.actor }} |"      >> $GITHUB_STEP_SUMMARY
          echo "| Fecha  | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
