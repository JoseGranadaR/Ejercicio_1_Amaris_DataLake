[pytest]
# ══════════════════════════════════════════════════════════════
# pytest.ini — Configuración del framework de pruebas
# ══════════════════════════════════════════════════════════════

# Carpeta donde están los tests
testpaths = tests

# Mostrar salida detallada por defecto
addopts =
    --verbose
    --tb=short
    --no-header
    --color=yes

# Patrones de archivos de test
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados (para separar tests por categoría)
markers =
    unit:        Pruebas unitarias rápidas (sin AWS)
    integration: Pruebas de integración (requieren AWS configurado)
    slow:        Pruebas lentas (más de 5 segundos)

# Variables de entorno para los tests (sobreescribe el .env real)
env =
    AWS_DEFAULT_REGION=us-east-1
    ENVIRONMENT=test
    LANDING_BUCKET=test-landing-bucket
    GLUE_DATABASE=test_database
    ATHENA_WORKGROUP=test-workgroup
    ATHENA_RESULTS_BUCKET=test-results-bucket
